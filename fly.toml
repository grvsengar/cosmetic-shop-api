app = "cosmetic-shop-api"
primary_region = "sin"   # Singapore — closest to Bhopal, India

[build]

[deploy]
  release_command = "bin/rails db:migrate"

[env]
  RAILS_ENV        = "production"
  RAILS_LOG_LEVEL  = "info"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
