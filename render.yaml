services:
  - type: web
    name: cosmetic-shop-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up

    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: cosmetic-shop-db
          property: connectionString
      - key: DEVISE_JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: cosmetic-shop-db
    plan: free
    region: singapore
    databaseName: cosmetic_shop_production
    user: cosmetic_shop
